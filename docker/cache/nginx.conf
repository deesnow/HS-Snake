# Nginx configuration for HS-Snake card image proxy cache.
#
# The bot requests card images at:
#   http://cache/cards/{locale}/{size}/{dbfId}.png
#
# Nginx proxies the first request to art.hearthstonejson.com and stores
# the result to a Docker volume. Subsequent requests are served from the
# volume without hitting upstream.

error_log /dev/stderr warn;

worker_processes 1;

events {
    worker_connections 256;
}

http {
    # ── Cache zone definition ────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/cards
        levels=1:2
        keys_zone=card_cache:10m
        max_size=4g
        inactive=365d
        use_temp_path=off;

    # ── Upstream ─────────────────────────────────────────────────────
    upstream hsjson_art {
        server art.hearthstonejson.com:443;
        keepalive 8;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name cache;

        # Card render images: /cards/{locale}/{size}/{dbfId}.png
        location /cards/ {
            # Strip /cards prefix and proxy to HSJSON art CDN
            rewrite ^/cards/(.*)$ /v1/render/latest/$1 break;

            proxy_pass         https://art.hearthstonejson.com;
            proxy_ssl_server_name on;
            proxy_ssl_name     art.hearthstonejson.com;
            proxy_set_header   Host art.hearthstonejson.com;

            proxy_cache            card_cache;
            proxy_cache_valid      200 365d;
            proxy_cache_use_stale  error timeout updating;
            proxy_cache_lock       on;

            add_header X-Cache-Status $upstream_cache_status;
        }

        # Health check
        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
}
