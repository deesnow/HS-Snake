# Development overrides — mounts local source for live reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    volumes:
      - ./bot:/app/bot         # Live-mount source
      - ./assets:/app/assets
      - ./docker/log:/app/logs
    working_dir: /app
    environment:
      LOG_LEVEL: DEBUG
    command: >
      sh -c "pip install watchdog &&
      python -m watchdog.watchmedo auto-restart
      --patterns='*.py'
      --recursive
      --debug-force-polling
      -- python -m bot.main"
