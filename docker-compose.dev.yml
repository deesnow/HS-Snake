# Development overrides — mounts local source for live reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    volumes:
      - ./bot:/app/bot
      - ./assets:/app/assets
      - ./log:/app/logs
      - ./data:/app/data
    working_dir: /app
    environment:
      LOG_LEVEL: DEBUG
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: hs-snake_user
      POSTGRES_PASSWORD: hs-snake_password
      POSTGRES_DB: hs-snake_db
    command: >
      python -m watchdog.watchmedo auto-restart
      --patterns='*.py'
      --recursive
      --debug-force-polling
      -- python -m bot.main
    networks:
      - internal
