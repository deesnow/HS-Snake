services:

  # ── Discord Bot ────────────────────────────────────────────────────
  bot:
    image: ghcr.io/deesnow/hs-snake:latest
    pull_policy: always
    env_file: .env
    depends_on:
      cache:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx card-image cache ─────────────────────────────────────────
  cache:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/cache/nginx.conf:/etc/nginx/nginx.conf:ro
      - card-cache:/var/cache/nginx/cards
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  card-cache:

networks:
  internal:
    driver: bridge
