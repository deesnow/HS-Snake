services:

  # ── Discord Bot ────────────────────────────────────────────────────
  bot:
    image: ghcr.io/OWNER/hs-snake:latest   # replace OWNER with your GitHub username
    pull_policy: always
    env_file: .env
    depends_on:
      cache:
        condition: service_healthy
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx card-image cache ─────────────────────────────────────────
  cache:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/cache/nginx.conf:/etc/nginx/nginx.conf:ro
      - card-cache:/var/cache/nginx/cards
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  card-cache:
  bot-data:

networks:
  internal:
    driver: bridge
