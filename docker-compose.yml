services:

  # ── Discord Bot ────────────────────────────────────────────────────
  bot:
    image: ghcr.io/deesnow/hs-snake:latest
    pull_policy: always
    env_file: .env
    environment:
      LOG_FILE: /app/logs/bot.log
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: hs-snake_user
      POSTGRES_PASSWORD: hs-snake_password
      POSTGRES_DB: hs-snake_db
    depends_on:
      cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./log:/app/logs
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx card-image cache ─────────────────────────────────────────
  cache:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/cache/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/cache/cards:/var/cache/nginx/cards
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PgSQL DB service ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hs-snake_user
      POSTGRES_PASSWORD: hs-snake_password
      POSTGRES_DB: hs-snake_db
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"




networks:
  internal:
    driver: bridge




